services:
  bookbuddarr-torznab:
    build:
      context: ${BOOKBUDDARR_SRC:-../..}
    container_name: bookbuddarr-torznab
    restart: unless-stopped
    env_file:
      - path: ${BOOKBUDDARR_ENV:-../../.env}
        required: false
    command: >
      sh -c 'bookbuddarr torznab-serve
      --bind 0.0.0.0
      --port 8765
      --hostname "$${AUDIOBOOKBAY_HOSTNAME:-audiobookbay.lu}"
      --page-limit "$${BOOKBUDDARR_PAGE_LIMIT:-2}"
      --timeout "$${BOOKBUDDARR_TIMEOUT:-15}"
      --api-key "$${BOOKBUDDARR_TORZNAB_API_KEY:?set BOOKBUDDARR_TORZNAB_API_KEY in env file}"
      --default-query "$${BOOKBUDDARR_DEFAULT_QUERY:-audiobook}"'
    ports:
      - "${BOOKBUDDARR_TORZNAB_PORT:-8765}:8765"
    networks:
      - bookbuddarr
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; url='http://127.0.0.1:8765/api?t=caps&apikey='+os.environ['BOOKBUDDARR_TORZNAB_API_KEY']; urllib.request.urlopen(url, timeout=5).read()\"",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  bookbuddarr-web:
    build:
      context: ${BOOKBUDDARR_SRC:-../..}
    container_name: bookbuddarr-web
    restart: unless-stopped
    env_file:
      - path: ${BOOKBUDDARR_ENV:-../../.env}
        required: false
    command:
      - bookbuddarr
      - web
      - --bind
      - "0.0.0.0"
      - --port
      - "8788"
      - --settings
      - /data/bookbuddarr_settings.json
    ports:
      - "${BOOKBUDDARR_WEB_PORT:-8788}:8788"
    volumes:
      - ${BOOKBUDDARR_DATA:-bookbuddarr-data}:/data
    networks:
      - bookbuddarr
    depends_on:
      - bookbuddarr-torznab
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/', timeout=5).read()\"",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  bookbuddarr:
    name: ${BOOKBUDDARR_NETWORK:-bookbuddarr}
    external: ${BOOKBUDDARR_NETWORK_EXTERNAL:-false}

volumes:
  bookbuddarr-data:
